name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  check-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking CI status for ${{ github.sha }}..."
          for i in $(seq 1 20); do
            # NOTE: `gh run list --commit <sha>` and the equivalent
            # `?head_sha=` API filter intermittently return empty results
            # for runs that exist (GitHub-side index lag). Listing recent
            # runs and filtering with jq is more reliable.
            RUN=$(gh api \
              "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?per_page=20" \
              --jq ".workflow_runs[] | select(.head_sha == \"${{ github.sha }}\") | {status, conclusion}" \
              | head -n 1)

            if [ -z "$RUN" ]; then
              echo "No CI run found for this commit (attempt $i/20), waiting 30s..."
              sleep 30
              continue
            fi

            STATUS=$(echo "$RUN" | jq -r '.status')
            CONCLUSION=$(echo "$RUN" | jq -r '.conclusion // "pending"')

            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "CI passed!"
                exit 0
              else
                echo "::error::CI failed with conclusion: $CONCLUSION. Release blocked."
                exit 1
              fi
            fi

            echo "CI still running (status: $STATUS, attempt $i/20), waiting 30s..."
            sleep 30
          done

          echo "::error::Timed out waiting for CI to complete (10 min). Release blocked."
          exit 1

  build-frontend:
    needs: check-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  build-binaries:
    needs: build-frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: web/frontend/build/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X github.com/zajca/zfaktury/internal/version.Version=${VERSION} -X github.com/zajca/zfaktury/internal/version.Commit=${COMMIT} -X github.com/zajca/zfaktury/internal/version.Date=${DATE}"

          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          go build -tags server -ldflags "${LDFLAGS}" -o "zfaktury${EXT}" ./cmd/zfaktury

      - name: Archive (tar.gz)
        if: matrix.goos != 'windows'
        run: tar czf "zfaktury-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" zfaktury

      - name: Archive (zip)
        if: matrix.goos == 'windows'
        run: zip "zfaktury-${{ matrix.goos }}-${{ matrix.goarch }}.zip" zfaktury.exe

      - uses: actions/upload-artifact@v4
        with:
          name: "zfaktury-${{ matrix.goos }}-${{ matrix.goarch }}"
          path: "zfaktury-*.*"
          retention-days: 1

  build-desktop:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev pkg-config

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: web/frontend/build/

      - name: Build desktop binary
        env:
          CGO_ENABLED: 1
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X github.com/zajca/zfaktury/internal/version.Version=${VERSION} -X github.com/zajca/zfaktury/internal/version.Commit=${COMMIT} -X github.com/zajca/zfaktury/internal/version.Date=${DATE}"

          go build -ldflags "${LDFLAGS}" -o zfaktury ./cmd/zfaktury

      - name: Archive
        run: tar czf zfaktury-desktop-linux-amd64.tar.gz zfaktury

      - uses: actions/upload-artifact@v4
        with:
          name: zfaktury-desktop-linux-amd64
          path: zfaktury-desktop-linux-amd64.tar.gz
          retention-days: 1

  release:
    needs: [build-binaries, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: zfaktury-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum zfaktury-* > checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p' || true)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          else
            LOG=$(git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "changelog<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect pre-release
        id: prerelease
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Checksums (SHA256)

            ```
            $(cat checksums.txt)
            ```
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: |
            zfaktury-*.tar.gz
            zfaktury-*.zip
            checksums.txt
