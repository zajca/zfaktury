version: "2"

linters:
  enable:
    - errcheck
    - errorlint
    - gocritic
    - revive
    - misspell
    - unconvert
    - nilerr
    - bodyclose
    - sqlclosecheck

  settings:
    errorlint:
      comparison: true
      asserts: true
    revive:
      rules:
        - name: exported
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
    paths:
      - vendor
      - frontend

formatters:
  enable:
    - gofmt
    - goimports
